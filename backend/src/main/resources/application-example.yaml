jasypt:
  encryptor:
    password: your-encryption-password-here
    algorithm: PBEWithMD5AndDES

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/healthy_diet_test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: your-database-username
    password: your-database-password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: 8080

spark:
  app-id: your-spark-app-id
  api-secret: your-spark-api-secret
  api-key: your-spark-api-key
  host: spark-api.xf-yun.com
  path: /v3.5/chat
  domain: generalv3.5

wechat:
  mini-program:
    app-id: your-wechat-app-id
    app-secret: your-wechat-app-secret

file:
  upload:
    path: src/main/resources/FoodImages
    # 服务器路径（需要时取消注释，并注释掉上面的本地路径）
    # path: /root/FoodImages
