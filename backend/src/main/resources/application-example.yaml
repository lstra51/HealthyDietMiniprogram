jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:your-encryption-password-here}
    algorithm: ${JASYPT_ENCRYPTOR_ALGORITHM:PBEWithMD5AndDES}

auth:
  token:
    secret: ${AUTH_TOKEN_SECRET:change-this-token-secret}
    expire-seconds: ${AUTH_TOKEN_EXPIRE_SECONDS:604800}

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/healthy_diet_test?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USERNAME:your-database-username}
    password: ${DB_PASSWORD:your-database-password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

server:
  port: ${SERVER_PORT:8080}

spark:
  app-id: ${SPARK_APP_ID:your-spark-app-id}
  api-secret: ${SPARK_API_SECRET:your-spark-api-secret}
  api-key: ${SPARK_API_KEY:your-spark-api-key}
  host: ${SPARK_HOST:spark-api.xf-yun.com}
  path: ${SPARK_PATH:/x2}
  domain: ${SPARK_DOMAIN:spark-x}

wechat:
  mini-program:
    app-id: ${WECHAT_APP_ID:your-wechat-app-id}
    app-secret: ${WECHAT_APP_SECRET:your-wechat-app-secret}

baidu:
  dish:
    app-id: ${BAIDU_DISH_APP_ID:your-baidu-app-id}
    api-key: ${BAIDU_DISH_API_KEY:your-baidu-api-key}
    secret-key: ${BAIDU_DISH_SECRET_KEY:your-baidu-secret-key}
    token-url: https://aip.baidubce.com/oauth/2.0/token
    dish-url: https://aip.baidubce.com/rest/2.0/image-classify/v2/dish

file:
  upload:
    path: ${FILE_UPLOAD_PATH:uploads}
    base-url: ${FILE_UPLOAD_BASE_URL:https://health.cupk.space}
    max-size-bytes: ${FILE_UPLOAD_MAX_SIZE_BYTES:5242880}
